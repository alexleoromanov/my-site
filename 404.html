<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Neon</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #010105;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border: 2px solid var(--neon-pink);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--neon-pink);
            background: rgba(0,0,0,0.8);
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container glass-card">
        <h1>404</h1>
        <p>Looks like you've rolled a gutter ball.</p>
        <p class="text-muted">The page you're looking for doesn't exist in our neon grid.</p>
        <a href="/" class="cta-button primary-glow">Back to Safety</a>
    </div>
</body>
</html>
